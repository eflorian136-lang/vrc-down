<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Video Downloader</title>
</head>
<body>
    <h1>Video Downloader</h1>
    
    <input type="text" id="videoLink" placeholder="Link zum Video" required>
    <input type="email" id="userEmail" placeholder="Deine E-Mail-Adresse" required>
    <button onclick="sendData()">Link absenden</button>
    <p id="status"></p>

    <script>
        async function sendData() {
            const link = document.getElementById('videoLink').value;
            const email = document.getElementById('userEmail').value;
            const status = document.getElementById('status');

            if (!link || !email) {
                status.innerText = "Bitte fülle beide Felder aus!";
                return;
            }

            status.innerText = "Sende...";

            const response = await fetch('/api/index', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ link: link, email: email })
            });

            if (response.ok) {
                status.innerText = "Erfolg! E-Mail wurde gesendet.";
            } else {
                status.innerText = "Fehler beim Senden.";
            }
        }
    </script>
</body>
</html>
