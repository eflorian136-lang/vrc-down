<!DOCTYPE html>
<html lang="de">
<body>
    <h1>StreamGraber</h1>
    <input type="text" id="url" placeholder="Twitch URL...">
    <button onclick="downloadVideo()">Video herunterladen</button>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('url').value;
            const res = await fetch('/api/download?url=' + encodeURIComponent(url));
            const data = await res.json();
            
            // Trick: Wir erstellen ein verstecktes Element, um den Download 
            // direkt von deiner Seite aus zu initiieren
            const link = document.createElement('a');
            link.href = data.downloadLink;
            link.setAttribute('download', 'video.mp4');
            document.body.appendChild(link);
            link.click();
            link.remove();
        }
    </script>
</body>
</html>
