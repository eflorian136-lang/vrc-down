<!DOCTYPE html>
<html>
<body>
    <h2>Twitch Stream Player</h2>
    <input type="text" id="url" placeholder="Twitch Link...">
    <button onclick="play()">Stream laden & speichern</button>
    <video id="video" controls style="width: 100%;"></video>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
    async function play() {
        const url = document.getElementById('url').value;
        const res = await fetch("https://vrc-down.onrender.com/download?url=" + encodeURIComponent(url));
        const data = await res.json();
        const v = document.getElementById('video');
        const hls = new Hls();
        hls.loadSource(data.url);
        hls.attachMedia(v);
        alert("Rechtsklick auf Video -> 'Video speichern unter...' zum Download!");
    }
    </script>
</body>
</html>
