<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>VOD Downloader</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>VOD Downloader</h2>
    <input type="text" id="vodUrl" placeholder="Twitch VOD URL eingeben...">
    <button onclick="startDownload(event)">Download starten</button>
</div>

<script>
function startDownload(event) {
    // Verhindert, dass die Seite neu lädt oder "springt"
    event.preventDefault(); 

    const url = document.getElementById('vodUrl').value;
    if (!url) { alert("Bitte gib eine URL ein!"); return; }

    // Der GitHub-Link
    const githubLink = `https://github.com/eflorian136-lang/vrc-down/edit/main/queue.txt?message=Add%20VOD:%20${encodeURIComponent(url)}&value=${encodeURIComponent(url)}`;
    
    window.open(githubLink, '_blank');
}
</script>
}
</script>

</body>
</html>
