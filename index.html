<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>VOD Downloader</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #queue-display { margin-top: 20px; width: 300px; text-align: left; }
        .queue-item { background: #f9f9f9; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 5px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>VOD Downloader</h2>
    <input type="text" id="vodUrl" placeholder="Twitch VOD URL eingeben...">
    <button onclick="startDownload(event)">Download starten</button>
</div>

<div id="queue-display">
    <h3>Warteschlange</h3>
    <div id="queue-list"></div>
</div>

<script>
function startDownload(event) {
    event.preventDefault();
    const url = document.getElementById('vodUrl').value;
    if (!url) { alert("Bitte URL eingeben!"); return; }

    const queueList = document.getElementById('queue-list');
    const item = document.createElement('div');
    item.className = 'queue-item';
    
    const commitUrl = `https://github.com/eflorian136-lang/vrc-down/edit/main/queue.txt?value=${encodeURIComponent(url)}`;
    
    item.innerHTML = `Link: ${url.substring(0, 20)}... <br> 
                      <button onclick="window.open('${commitUrl}', '_blank')">Jetzt zu GitHub & Committen</button>`;
    
    queueList.appendChild(item);
    document.getElementById('vodUrl').value = '';
}
</script>

</body>
</html>
