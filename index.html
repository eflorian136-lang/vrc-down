<!DOCTYPE html>

    <title>VRC VOD Downloader</title>

<body>
    <h1>VRC VOD Downloader</h1>
    <p>Um ein Video herunterzuladen, folge diesen Schritten:</p>
    <ol>
        <li>Klicke auf den Button unten, um zu deinem GitHub-Repository zu gelangen.</li>
        <li>Wähle dort den Tab <b>"Actions"</b>.</li>
        <li>Wähle den Workflow <b>"VOD Download"</b> aus.</li>
        <li>Klicke auf <b>"Run workflow"</b> und gib deine Twitch-URL ein.</li>
    </ol>
    <a href="https://github.com/eflorian136-lang/vrc-down/actions" target="_blank">
        <button style="padding: 10px 20px; font-size: 16px;">Zum Downloader (GitHub Actions)</button>
    </a>
</body>
