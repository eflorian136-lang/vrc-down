<!DOCTYPE html>
<html>
<head><title>Twitch 24/7 Downloader</title></head>
<body>
    <h2>Twitch Stream Player</h2>
    <input type="text" id="url" placeholder="Twitch URL..." style="width:300px;">
    <button onclick="play()">Stream laden</button>
    <br><br>
    <video id="v" controls style="width: 80%;"></video>
    <script>
    async function play() {
        const url = document.getElementById('url').value;
        const res = await fetch("https://vrc-down.onrender.com/download?url=" + encodeURIComponent(url));
        const data = await res.json();
        if(data.url) {
            const v = document.getElementById('v');
            v.src = data.url;
            v.play();
        } else { alert("Fehler beim Laden."); }
    }
    </script>
</body>
</html>
