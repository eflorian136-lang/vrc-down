<!DOCTYPE html>
<html>
<head><title>Twitch Downloader</title></head>
<body>
    <h2>Twitch Stream Player</h2>
    <input type="text" id="url" placeholder="Twitch Link..." style="width:300px;">
    <button onclick="play()">Stream laden</button>
    <video id="v" controls style="width: 80%; margin-top: 20px;"></video>
    <script>
    async function play() {
        const url = document.getElementById('url').value;
        const res = await fetch("https://vrc-down.onrender.com/download?url=" + encodeURIComponent(url));
        const data = await res.json();
        if(data.url) {
            const v = document.getElementById('v');
            v.src = data.url;
            alert("Lade...");
        } else { alert("Fehler!"); }
    }
    </script>
</body>
</html>
