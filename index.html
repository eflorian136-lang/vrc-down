<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Twitch Video Downloader</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; background: #9146FF; color: white; border: none; }
    </style>
</head>
<body>
    <h1>Twitch Downloader</h1>
    <p>Link einfügen, "Stream laden" klicken und danach Rechtsklick auf das Video zum Speichern.</p>
    <input type="text" id="url" placeholder="https://www.twitch.tv/videos/...">
    <button onclick="play()">Stream laden</button>
    <br><br>
    <video id="v" controls style="width: 70%; border: 1px solid #ccc;"></video>

    <script>
    async function play() {
        const btn = document.querySelector('button');
        btn.innerText = "Lade Daten...";
        const url = document.getElementById('url').value;
        const res = await fetch("https://vrc-down.onrender.com/download?url=" + encodeURIComponent(url));
        const data = await res.json();
        if(data.url) {
            const v = document.getElementById('v');
            v.src = data.url;
            btn.innerText = "Stream laden";
        } else { alert("Fehler: Link prüfen."); btn.innerText = "Stream laden"; }
    }
    </script>
</body>
</html>
